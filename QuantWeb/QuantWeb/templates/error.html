<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 量化交易系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background: #1a1a2e; color: #fff; padding: 16px 32px; }
        .navbar h1 { font-size: 1.4em; }
        .navbar a { color: #fff; text-decoration: none; }
        .center { flex: 1; display: flex; align-items: center; justify-content: center; }
        .error-box { text-align: center; padding: 60px; }
        .error-box h2 { font-size: 1.8em; margin-bottom: 12px; color: #e74c3c; }
        .error-box p { color: #666; margin-bottom: 24px; }
        .error-box a { color: #4361ee; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><a href="{% url 'index' %}">📈 量化交易系统</a></h1>
    </nav>
    <div class="center">
        <div class="error-box">
            <h2>出错了</h2>
            <p>{{ message }}</p>
            <a href="{% url 'index' %}">← 返回首页</a>
        </div>
    </div>
</body>
</html>
